version: "1.0"
stage: 2

cases:
  # ── Market Data ────────────────────────────────────────────────────────────

  - id: "gs-001"
    query: "What is the current price of AAPL?"
    category: "market_data"
    subcategory: "single_symbol"
    difficulty: "straightforward"
    expected_tools:
      - "market_data_fetch"
    must_contain:
      - "AAPL"
    must_not_contain:
      - "unable to"
      - "I don't know"
      - "I can help you with"

  - id: "gs-002"
    query: "Show me the prices of MSFT and GOOGL"
    category: "market_data"
    subcategory: "multi_symbol"
    difficulty: "straightforward"
    expected_tools:
      - "market_data_fetch"
    must_contain:
      - "MSFT"
      - "GOOGL"
    must_not_contain:
      - "unable to"
      - "I can help you with"

  - id: "gs-003"
    query: "What is the price of BTC-USD?"
    category: "market_data"
    subcategory: "crypto"
    difficulty: "straightforward"
    expected_tools:
      - "market_data_fetch"
    must_contain:
      - "BTC"
    must_not_contain:
      - "I can help you with"

  - id: "gs-004"
    query: "Get me the price of XYZNOTREAL"
    category: "market_data"
    subcategory: "invalid_symbol"
    difficulty: "edge_case"
    expected_tools:
      - "market_data_fetch"
    must_contain:
      - "XYZNOTREAL"
    must_not_contain:
      - "I can help you with"

  - id: "gs-005"
